name: Golangci-lint

# golangci-lint is a fast Go linters runner. It runs linters in parallel,
# uses caching, supports yaml config, has integrations with all major IDE and
# has dozens of linters included.
# see: https://github.com/golangci/golangci-lint-action

on:
  pull_request:
  workflow_dispatch:

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go from go.mod
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          # Keep CI on the module's declared Go line instead of floating to new majors.
          check-latest: false

      - run: go version

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11.4
          args: --timeout=5m
